<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Royal Rose Gradients -->
    <linearGradient id="roseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#9f1239" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="innerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fff1f2" />
    </linearGradient>
    <!-- Shadow for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#881337" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Outer Transparent Circle & Shadow -->
  <g filter="url(#dropShadow)">
    <!-- Main Outer Ring -->
    <circle cx="256" cy="256" r="236" fill="url(#innerBg)" stroke="url(#roseGradient)" stroke-width="16" />
    <!-- Subtle Inner Gold/Rose Ring -->
    <circle cx="256" cy="256" r="212" fill="none" stroke="#fecdd3" stroke-width="4" stroke-dasharray="8 6" />
  </g>

  <!-- Center Clothes Hanger Illustration -->
  <g transform="translate(0, -20)">
    <!-- Hanger Hook -->
    <path d="M 256,120 C 230,120 220,100 235,80 C 250,60 280,65 280,95 C 280,115 256,120 256,150 L 256,170" 
          fill="none" stroke="url(#goldGradient)" stroke-width="12" stroke-linecap="round" />
    <!-- Hanger Body / Shoulders -->
    <path d="M 140,240 L 256,170 L 372,240 Q 380,245 375,252 L 365,260 Q 360,265 350,265 L 162,265 Q 152,265 147,260 L 137,252 Q 132,245 140,240 Z" 
          fill="url(#roseGradient)" />
    <!-- Inner Cutout of Hanger -->
    <path d="M 175,248 L 256,198 L 337,248 Z" fill="url(#innerBg)" />
    <!-- Subtle Pyjama Ribbon / Bow under hanger -->
    <path d="M 246,265 Q 256,278 266,265" fill="none" stroke="url(#goldGradient)" stroke-width="6" stroke-linecap="round" />
  </g>

  <!-- Brand Typography -->
  <text x="256" y="325" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="44" font-weight="900" fill="#881337" text-anchor="middle" letter-spacing="4">
    PYJAMA DZ
  </text>

  <text x="256" y="362" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="16" font-weight="700" fill="#e11d48" text-anchor="middle" letter-spacing="6">
    ATELIER MODE &amp; CONFEC
  </text>

  <!-- Decorative Stars -->
  <g fill="url(#goldGradient)">
    <polygon points="150,345 153,353 161,353 155,358 157,366 150,361 143,366 145,358 139,353 147,353" transform="scale(0.8) translate(50, 80)" />
    <polygon points="362,345 365,353 373,353 367,358 369,366 362,361 355,366 357,358 351,353 359,353" transform="scale(0.8) translate(95, 80)" />
  </g>

  <!-- Bottom Classic Curve / Ribbon -->
  <path d="M 180,400 Q 256,420 332,400" fill="none" stroke="#fecdd3" stroke-width="4" stroke-linecap="round" />
  <circle cx="256" cy="410" r="5" fill="#e11d48" />
</svg>
